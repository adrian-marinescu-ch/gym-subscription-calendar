<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1f2937">
  <meta name="description" content="Gym subscription calculator with variable session cost, payment schedule, sharing, exports, and offline support.">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="stylesheet" href="./style.css">
  <title>Gym Subscription Calculator</title>
</head>
<body>
  <div class="app-shell">
    <header class="topbar card">
      <div>
        <h1 data-i18n="title"></h1>
      </div>
      <div class="topbar-actions">
        <div class="lang-switcher" role="group" aria-label="Language switcher">
          <button type="button" class="lang-btn" data-lang="ro">RO</button>
          <button type="button" class="lang-btn" data-lang="en">EN</button>
        </div>
        <div class="quick-actions" role="group" aria-label="Quick actions">
          <button id="copyLinkBtn" type="button" class="primary-btn" data-i18n="copyShareLink"></button>
          <button id="exportCsvBtn" type="button" class="secondary-btn" data-i18n="exportCsv"></button>
          <button id="exportIcsBtn" type="button" class="secondary-btn" data-i18n="exportIcs"></button>
        </div>
      </div>
    </header>

    <section class="status-stack">
      <div id="offlineBanner" class="banner hidden"></div>
      <div id="updateBanner" class="banner hidden">
        <span id="updateBannerText"></span>
        <button id="updateButton" type="button" class="secondary-btn" data-i18n="refreshForUpdate"></button>
      </div>
      <div id="toast" class="banner info hidden"></div>
    </section>

    <section id="gdprBanner" class="cookie-banner hidden" role="dialog" aria-live="polite" aria-label="Cookie consent">
      <div class="cookie-banner-content">
        <strong data-i18n="gdprTitle"></strong>
        <p data-i18n="gdprMessage"></p>
      </div>
      <div class="cookie-banner-actions">
        <button id="gdprAcceptBtn" type="button" class="primary-btn" data-i18n="gdprAccept"></button>
        <button id="gdprRejectBtn" type="button" class="secondary-btn" data-i18n="gdprReject"></button>
      </div>
    </section>

    <main class="page-grid">
      <div class="grid-two">
        <section class="card">
          <details id="configDetails">
            <summary data-i18n="configTitle"></summary>

            <div class="field-grid">
              <label class="field">
                <span data-i18n="startDate"></span>
                <input id="startDateInput" type="date" required>
              </label>

              <label class="field">
                <span data-i18n="sessionTime"></span>
                <input id="sessionTimeInput" type="time" step="900" required>
              </label>

              <label class="field">
                <span data-i18n="monthlyPrice"></span>
                <input id="monthlyPriceInput" type="number" min="0" step="0.01" inputmode="decimal" required>
              </label>

              <label class="field field-readonly">
                <span data-i18n="timezoneDetected"></span>
                <input id="timezoneDisplay" type="text" readonly>
              </label>
            </div>

            <div class="field-block">
              <div class="field-label" data-i18n="weekdays"></div>
              <div id="weekdaySelector" class="weekday-selector"></div>
            </div>
          </details>
        </section>

        <section class="card">
          <details id="excludedDetails">
            <summary data-i18n="excludedTitle"></summary>
            <div class="split-header">
              <p class="muted" data-i18n="excludedHint"></p>
              <button id="addExclusionBtn" type="button" class="secondary-btn" data-i18n="addInterval"></button>
            </div>
            <div id="exclusionList" class="exclusion-list"></div>
          </details>
        </section>
      </div>

      <div class="grid-three">
        <section class="card">
          <details id="summaryDetails">
            <summary data-i18n="summaryTitle"></summary>
            <div class="summary-grid">
              <div class="summary-item">
                <span class="summary-label" data-i18n="annualTotal"></span>
                <strong id="annualTotalValue"></strong>
              </div>
              <div class="summary-item">
                <span class="summary-label" data-i18n="eligibleSessions"></span>
                <strong id="eligibleSessionsValue"></strong>
              </div>
              <div class="summary-item">
                <span class="summary-label" data-i18n="costPerSession"></span>
                <strong id="costPerSessionValue"></strong>
              </div>
              <div class="summary-item">
                <span class="summary-label" data-i18n="cycleRange"></span>
                <strong id="cycleRangeValue"></strong>
              </div>
              <div class="summary-item">
                <span class="summary-label" data-i18n="remainingSessions"></span>
                <strong id="remainingSessionsValue"></strong>
              </div>
              <div class="summary-item">
                <span class="summary-label" data-i18n="excludedPotentialSessions"></span>
                <strong id="excludedPotentialSessionsValue"></strong>
              </div>
            </div>
          </details>
        </section>

        <section class="card">
          <details id="plainLanguageDetails">
            <summary data-i18n="plainLanguageTitle"></summary>
            <div id="plainLanguageNotes" class="stack-text"></div>
          </details>
        </section>

      </div>

      <section class="card">
        <div class="card-header split-header">
          <div>
            <h2 data-i18n="paymentTitle"></h2>
          </div>
          <div id="nextDeadlineBadge" class="next-deadline-badge"></div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th data-i18n="paymentNo"></th>
                <th data-i18n="paymentDate"></th>
                <th data-i18n="coverageDate"></th>
                <th data-i18n="monthSessionCount"></th>
                <th data-i18n="paymentThreshold"></th>
              </tr>
            </thead>
            <tbody id="paymentTableBody"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <details id="calendarDetails">
          <summary id="calendarSummaryLine"></summary>
          <p class="muted" data-i18n="calendarHint"></p>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th data-i18n="date"></th>
                  <th data-i18n="weekday"></th>
                  <th data-i18n="weekdayEnabled"></th>
                  <th data-i18n="excludedColumn"></th>
                  <th data-i18n="eligible"></th>
                  <th data-i18n="sessionNumber"></th>
                  <th data-i18n="sessionValue"></th>
                  <th data-i18n="accumulated"></th>
                </tr>
              </thead>
              <tbody id="calendarTableBody"></tbody>
            </table>
          </div>
        </details>
      </section>
    </main>

    <footer class="site-footer">
      <p>Dezvoltat de <a href="https://github.com/adrian-marinescu-ch/gym-subscription-calendar" target="_blank">Adrian Marinescu</a> cu ❤️ in 2026</p>
    </footer>
  </div>

  <script src="./app.js"></script>
</body>
</html>
